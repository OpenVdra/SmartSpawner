# SmartSpawner – items.yml
# Spawner item display names and drop item names.

# Appearance of smart spawner items in inventory and tooltips
smart_spawner:
  name: '&#5DB5F1{entity} Spawner'
  loot_items: '  &#ecf0f1 • {amount} {item_name} &#3498db({chance}%)'
  loot_items_empty: '  &#ecf0f1 •  None'
  lore:
    - ''
    - ' &#5DB5F1 ᴅᴇᴛᴀɪʟ:'
    - '  &#ecf0f1 • &fEXP give: &a{exp}'
    - ''
    - ' &#5DB5F1 ᴅʀᴏᴘꜱ:'
    - '{loot_items}'
    - ''

# Appearance of item spawner items in inventory and tooltips
item_spawner:
  name: '&#5DB5F1{entity} Spawner'
  fallback_name: '&#5DB5F1{entity} Spawner'
  loot_items: '  &#ecf0f1 • {amount} {item_name} &#3498db({chance}%)'
  loot_items_empty: '  &#ecf0f1 •  None'
  lore:
    - ''
    - ' &#5DB5F1 ᴅᴇᴛᴀɪʟ:'
    - '  &#ecf0f1 • &fEXP give: &a{exp}'
    - ''
    - ' &#5DB5F1 ᴅʀᴏᴘꜱ:'
    - '{loot_items}'
    - ''

# Appearance of vanilla spawner items in inventory and tooltips
# Available placeholders: {entity}, {ᴇɴᴛɪᴛʏ}
# Delete this section if you don't want to use custom vanilla spawners name and lore
vanilla_spawner:
  name: "{entity} Spawner"
  lore:
