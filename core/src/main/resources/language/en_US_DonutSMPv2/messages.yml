  sound: block.note_block.pling

spawner_cannot_remove_last:
  action_bar: '&#FF4444You cannot remove the last spawner.'
  sound: block.note_block.pling

spawner_insufficient_quantity:
  action_bar: '&#FF4444Not enough spawners: &f{amountAvailable}&c/&f{amountChange}'
  sound: block.note_block.pling

stacker_drop_blocked:
  message: '&#FF4444Stacker GUI is disabled when this spawner has drop chance.'
  sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#             Spawner - Stack Interaction
# ──────────────────────────────────────────────────────
spawner_different:
  action_bar: '&#FF4444Spawners must be the same type.'
  sound: block.note_block.pling

spawner_stack_full:
  action_bar: '&#FF4444Maximum stack limit: &f{max}'
  sound: block.note_block.pling

spawner_stack_success:
  action_bar: '&aYou successfully stacked &f{amount} &aspawner(s).'
