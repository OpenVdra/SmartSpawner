# SmartSpawner – messages.yml
# Each entry supports: message, title, subtitle, action_bar, sound, enabled.
#
#   MESSAGE STRUCTURE:
#   message_name:               # Unique identifier for the message
#     enabled: true/false       # Enable or disable this entire message (default: true if not specified)
#     message: "Text content"   # Main chat message (optional)
#     title: "Title text"       # Title display (optional)
#     subtitle: "Subtitle"      # Subtitle display (optional)
#     action_bar: "Text"        # Action bar text (optional)
#     sound: sound.effect       # Sound to play (optional)
#
#   KEY FEATURES:
#   - If "enabled: false" is set, none of the components will be sent to the player
#   - If multiple components are present (message, title, action_bar, sound), all will be sent
#   - All components are optional - you can use any combination as needed
#   - The "message" field is not required and can be omitted if you only want other components

prefix: '&#3498dbSᴍᴀʀᴛSᴘᴀᴡɴᴇʀ &8⏩ &r'

internal:
  missing_message_key:
    message: '&#FF4444Missing message key: &f{key}'

# ──────────────────────────────────────────────────────
#              Player Interaction (General)
# ──────────────────────────────────────────────────────
spawner_activated:
  message: 'The spawner has been&a activated. &rYou can now collect drops and EXP.'
  sound: block.beacon.activate

spawner_protected:
  message: '&#FF4444This spawner is protected'
  sound: block.note_block.pling

inventory_full:
  message: '&#FF4444Your inventory is full.'
  sound: block.note_block.pling

spawner_storage_empty:
  message: '&#FF4444Spawner storage is empty.'
  sound: block.note_block.pling

action_in_progress:
  message: '&#F0C857There is already an action in progress. Please wait.'
  sound: block.note_block.pling

action_failed:
  action_bar: '&#FF4444The action failed. Please try again.'
  sound: block.note_block.pling

no_spawners_found:
  message: '&#FF4444No spawners were found.'
  sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#             Spawner - Main GUI Interactions
# ──────────────────────────────────────────────────────
no_exp:
  message: '&#FF4444There is no EXP available'
  sound: block.note_block.pling

exp_collected:
  message: 'You collected &a{exp} &fexperience.'
  action_bar: '&a+{exp} EXP'
  sound: entity.experience_orb.pickup

exp_collected_with_mending:
  message: 'You collected &a{exp} &fexperience. &c{exp_mending} &fwas used on Mending.'
  action_bar: '&a+{exp} EXP &f| &c-{exp_mending} used on Mending'
  sound: entity.experience_orb.pickup

# ──────────────────────────────────────────────────────
#            Spawner - Storage GUI Interactions
# ──────────────────────────────────────────────────────
