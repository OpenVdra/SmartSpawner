# SmartSpawner – messages.yml
# Her giriş şunları destekler: message, title, subtitle, action_bar, sound, enabled.
#
#   MESAJ YAPISI:
#   message_name:               # Mesajın benzersiz tanımlayıcısı
#     enabled: true/false       # Bu mesajın tamamını etkinleştirir veya devre dışı bırakır (varsayılan: true)
#     message: "Metin içeriği"   # Ana sohbet mesajı (isteğe bağlı)
#     title: "Başlık metni"      # Ekran başlığı (isteğe bağlı)
#     subtitle: "Alt başlık"     # Ekran alt başlığı (isteğe bağlı)
#     action_bar: "Metin"        # Action bar metni (isteğe bağlı)
#     sound: sound.effect       # Oynatılacak ses efekti (isteğe bağlı)
#
#   ÖNEMLİ ÖZELLİKLER:
#   - "enabled: false" olarak ayarlanırsa, oyuncuya hiçbir bileşen gönderilmez.
#   - Birden fazla bileşen mevcutsa (message, title, action_bar, sound), hepsi aynı anda gönderilir.
#   - Tüm bileşenler isteğe bağlıdır; dilediğiniz kombinasyonu kullanabilirsiniz.
#   - Diğer bileşenleri tek başına kullanmak isterseniz "message" alanını boş bırakabilir veya silebilirsiniz.

