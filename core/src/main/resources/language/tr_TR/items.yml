# SmartSpawner – items.yml
# Spawner eşyası görünüm adları ve düşen eşya adları.

custom_item:
  # Envanterde ve bilgi pencerelerinde (tooltip) Smart Spawner görünümü
  spawner:
    name: "&#3498db{entity} Spawner"
    loot_items: "  &#ecf0f1•  {amount} {item_name} &#3498db({chance}%)"
    loot_items_empty: "  &#ecf0f1•  Yok"
    lore:
      - ""
      - "&#3498db◈ &#3498dbDetaylar:"
      - "  &#ecf0f1•  Verilen XP: &#3498db{exp}"
      - ""
      - "&#3498db◈ &#3498dbDüşenler:"
      - "{loot_items}"
      - ""

  # Envanterde ve bilgi pencerelerinde (tooltip) Item Spawner görünümü
  item_spawner:
    name: "&#3498db{entity} Spawner"
    loot_items: "  &#ecf0f1•  {amount} {item_name} &#3498db({chance}%)"
    loot_items_empty: "  &#ecf0f1•  Yok"
    lore:
      - ""
      - "&#3498db◈ &#3498dbDetaylar:"
      - "  &#ecf0f1•  Verilen XP: &#3498db{exp}"
      - ""
      - "&#3498db◈ &#3498dbDüşenler:"
      - "{loot_items}"
      - ""

  # Envanterde ve bilgi pencerelerinde (tooltip) Vanilla Spawner eşyalarının görünümü
  # Kullanılabilir değişkenler: {entity}
  # Özel Vanilla Spawner adı ve açıklaması kullanmak istemiyorsanız bu bölümü silin
  vanilla_spawner:
    name: "{entity} Spawner"
    lore: 